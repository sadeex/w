*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
:root{
  --gold:#d4af37;--gold2:#f5d061;--gold3:#b8860b;
  --dark:#07070d;--text:#f5f3ec;--muted:#a8a294;
  --glass:rgba(255,255,255,.06);
  --glass2:rgba(255,255,255,.09);
  --gborder:rgba(255,255,255,.14);
  --gold-border:rgba(212,175,55,.35);
}
body{background:var(--dark);color:var(--text);min-height:100vh;overflow-x:hidden}

.bg{position:fixed;inset:0;z-index:-3;background:
  radial-gradient(ellipse 70% 50% at 20% 0%, rgba(212,175,55,.13), transparent 55%),
  radial-gradient(ellipse 60% 45% at 85% 100%, rgba(184,134,11,.12), transparent 55%),
  linear-gradient(160deg,#0a0a12 0%,#07070d 50%,#0c0a08 100%)}
.blob{position:fixed;border-radius:50%;filter:blur(90px);z-index:-2;opacity:.5;animation:blobFloat 18s ease-in-out infinite alternate}
.blob.b1{width:420px;height:420px;background:rgba(212,175,55,.16);top:-120px;left:-100px}
.blob.b2{width:380px;height:380px;background:rgba(245,208,97,.10);bottom:-100px;right:-80px;animation-delay:-6s;animation-duration:22s}
@keyframes blobFloat{0%{transform:translate(0,0) scale(1)}50%{transform:translate(60px,-40px) scale(1.15)}100%{transform:translate(-40px,50px) scale(.92)}}
.spark{position:fixed;border-radius:50%;z-index:-1;bottom:-20px;background:rgba(245,208,97,.5);box-shadow:0 0 6px rgba(245,208,97,.8);animation:sparkUp linear infinite}
@keyframes sparkUp{0%{transform:translateY(0) scale(1);opacity:0}10%{opacity:.9}90%{opacity:.3}100%{transform:translateY(-110vh) scale(.2);opacity:0}}

.navbar{position:sticky;top:12px;z-index:100;display:flex;align-items:center;justify-content:space-between;
  margin:12px auto 0;max-width:1200px;width:calc(100% - 24px);
  padding:10px 18px;border-radius:24px;
  background:linear-gradient(135deg,rgba(255,255,255,.10),rgba(255,255,255,.03));
  backdrop-filter:blur(24px) saturate(160%);-webkit-backdrop-filter:blur(24px) saturate(160%);
  border:1px solid var(--gborder);
  box-shadow:0 8px 32px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.18);
  animation:navIn .8s cubic-bezier(.2,.9,.3,1.2) both}
@keyframes navIn{from{opacity:0;transform:translateY(-30px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.logo{display:flex;align-items:center;gap:12px;text-decoration:none;font-size:1.3rem;font-weight:800;color:var(--text)}
.logo-img{width:46px;height:46px;border-radius:50%;object-fit:cover;flex-shrink:0;
  border:2px solid var(--gold-border);
  box-shadow:0 0 18px rgba(212,175,55,.5);animation:lionGlow 3s ease-in-out infinite}
@keyframes lionGlow{0%,100%{box-shadow:0 0 12px rgba(212,175,55,.4)}50%{box-shadow:0 0 28px rgba(245,208,97,.8)}}
.logo-text{background:linear-gradient(100deg,#f5d061 0%,#fffbe6 25%,#d4af37 50%,#fffbe6 75%,#f5d061 100%);
  background-size:200% auto;-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  animation:goldShine 3.5s linear infinite;letter-spacing:.5px}
@keyframes goldShine{to{background-position:200% center}}
.nav-links{display:flex;align-items:center;gap:8px}
.nav-btn{text-decoration:none;color:var(--muted);font-weight:600;font-size:.88rem;padding:9px 18px;border-radius:50px;transition:all .35s;border:1px solid transparent}
.nav-btn:hover{color:#fff;background:var(--glass2);border-color:var(--gborder)}
.nav-btn.admin{color:#0d0b06;font-weight:800;background:linear-gradient(135deg,var(--gold2),var(--gold));
  box-shadow:0 4px 18px rgba(212,175,55,.4), inset 0 1px 0 rgba(255,255,255,.5)}
.nav-btn.admin:hover{transform:translateY(-2px) scale(1.04);box-shadow:0 8px 28px rgba(212,175,55,.6)}

.page{max-width:1200px;margin:0 auto;display:grid;grid-template-columns:1fr 180px;gap:24px;padding:20px}
.main-col{min-width:0}

.ad-slot{display:flex;flex-direction:column;align-items:center;margin:26px auto;max-width:100%;overflow:hidden;animation:fadeIn 1.3s ease both}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.ad-label{font-size:.58rem;letter-spacing:3px;color:#5a5648;text-transform:uppercase;margin-bottom:6px}
.ad-glass{padding:10px;border-radius:20px;
  background:linear-gradient(135deg,rgba(255,255,255,.07),rgba(255,255,255,.02));
  backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
  border:1px solid var(--gborder);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.12), 0 10px 30px rgba(0,0,0,.35)}
.ad-468{display:flex;justify-content:center}

.post-hero-img{width:100%;max-height:440px;object-fit:cover;border-radius:26px;margin-top:22px;display:none;
  border:1px solid var(--gold-border);
  box-shadow:0 22px 55px rgba(0,0,0,.55), 0 0 40px rgba(212,175,55,.12);
  animation:imgIn 1s cubic-bezier(.2,.9,.3,1.15) both}
@keyframes imgIn{from{opacity:0;transform:translateY(35px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}

.post-view-head{padding:28px 0 6px;animation:headIn .9s cubic-bezier(.2,.9,.3,1.1) both}
@keyframes headIn{from{opacity:0;transform:translateY(-25px)}to{opacity:1;transform:translateY(0)}}
.post-view-head h1{font-size:clamp(1.3rem,4vw,2rem);line-height:1.4;
  background:linear-gradient(100deg,#fffbe6,#f5d061,#fffbe6);background-size:200% auto;
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  animation:goldShine 5s linear infinite}
.post-view-head .date{color:var(--muted);font-size:.85rem;margin-top:10px}

.post-frame{width:100%;border-radius:26px;min-height:75vh;margin-top:20px;
  background:rgba(10,10,16,.6);
  border:1px solid var(--gborder);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.1), 0 25px 60px rgba(0,0,0,.5);
  animation:frameUp 1s cubic-bezier(.2,.9,.3,1.15) both}
@keyframes frameUp{from{opacity:0;transform:translateY(45px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}

.loader{display:flex;justify-content:center;padding:60px 0}
.spinner{width:50px;height:50px;border-radius:50%;border:3px solid rgba(212,175,55,.15);border-top-color:var(--gold2);animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;
  padding:13px 32px;border-radius:50px;cursor:pointer;font-size:.95rem;font-weight:700;
  color:var(--text);text-decoration:none;
  background:linear-gradient(135deg,rgba(255,255,255,.10),rgba(255,255,255,.03));
  backdrop-filter:blur(14px);border:1px solid var(--gborder);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.15);transition:all .35s}
.btn:hover{border-color:var(--gold-border);color:var(--gold2);transform:translateY(-3px);
  box-shadow:0 10px 30px rgba(212,175,55,.2), inset 0 1px 0 rgba(255,255,255,.15)}

.sidebar{display:flex;flex-direction:column;align-items:center;animation:fadeIn 1.6s ease both}
.sidebar-sticky{position:sticky;top:90px}

footer{text-align:center;padding:36px 16px;color:#5a5648;font-size:.8rem;margin-top:46px;border-top:1px solid rgba(255,255,255,.07)}
footer img{width:42px;height:42px;border-radius:50%;object-fit:cover;border:2px solid var(--gold-border);margin-bottom:10px;opacity:.85}
footer .f-logo{font-weight:800;color:var(--gold);margin-bottom:4px;letter-spacing:1px}

@media(max-width:1000px){.page{grid-template-columns:1fr}.sidebar{display:none}}
@media(max-width:560px){

  .logo{font-size:1.05rem}.logo-img{width:38px;height:38px}
  .nav-btn{padding:8px 13px;font-size:.8rem}
}
</style>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, doc, getDoc }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBRdukrD1dM5AJmbAh7JPT2yWsHdgzbvzw",
    authDomain: "ssss-19e02.firebaseapp.com",
    projectId: "ssss-19e02",
    storageBucket: "ssss-19e02.firebasestorage.app",
    messagingSenderId: "17505490718",
    appId: "1:17505490718:web:505a11b64236129907db0f",
    measurementId: "G-P4EY62HW01"
  };
  const db = getFirestore(initializeApp(firebaseConfig));

  for(let i=0;i<18;i++){
    const p=document.createElement('div');p.className='spark';
    const s=Math.random()*4+1.5;p.style.width=p.style.height=s+'px';
    p.style.left=Math.random()*100+'vw';
    p.style.animationDuration=(Math.random()*13+9)+'s';
    p.style.animationDelay=(Math.random()*10)+'s';
    document.body.appendChild(p);
  }

  const id=new URLSearchParams(location.search).get('id');
  const titleEl=document.getElementById('postTitle');
  const dateEl=document.getElementById('postDate');
  const frame=document.getElementById('postFrame');
  const loader=document.getElementById('loader');

  if(!id){
    titleEl.textContent='Post not found';
    loader.style.display='none';
  }else{
    try{
      const snap=await getDoc(doc(db,'posts',id));
      loader.style.display='none';
      if(!snap.exists()){
        titleEl.textContent='😕 Post not found';
      }else{
        const post=snap.data();
        titleEl.textContent=post.title||'Untitled Post';
        document.title=(post.title||'Post')+' — Liger Co';
        if(post.createdAt?.toDate){
          dateEl.textContent='📅 '+post.createdAt.toDate().toLocaleString('en-GB',
            {day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'});
        }
        if(post.image){
          const heroImg=document.getElementById('postHeroImg');
          heroImg.src=post.image;
          heroImg.style.display='block';
          heroImg.onerror=()=>{heroImg.style.display='none'};
        }
        frame.style.display='block';
        frame.srcdoc=post.html||'<p style="color:#888;font-family:sans-serif;padding:20px">Empty post</p>';
        frame.onload=()=>{
          try{
            const h=frame.contentDocument.documentElement.scrollHeight;
            if(h>200) frame.style.height=(h+30)+'px';
          }catch(e){}
        };
      }
    }catch(err){
      loader.style.display='none';
      titleEl.textContent='Error loading post';
      dateEl.textContent=err.message;
    }
  }
</script>
