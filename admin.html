<!DOCTYPE html>
<html lang="si">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — Liger Co</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',system-ui,-apple-system,sans-serif}
:root{
  --red:#ff0033;--red2:#ff4d6d;--purple:#7b2cff;
  --dark:#0a0a14;--card:#13131f;--card2:#1a1a2a;
  --text:#f1f1f7;--muted:#9a9ab0;--border:rgba(255,255,255,.08);
}
body{background:var(--dark);color:var(--text);min-height:100vh;overflow-x:hidden}

.bg-glow{position:fixed;inset:0;z-index:-2;
  background:
    radial-gradient(ellipse 60% 40% at 15% 10%, rgba(255,0,51,.16), transparent 60%),
    radial-gradient(ellipse 50% 40% at 85% 90%, rgba(123,44,255,.14), transparent 60%);
  animation:bgShift 14s ease-in-out infinite alternate}
@keyframes bgShift{0%{filter:hue-rotate(0deg) brightness(1)}100%{filter:hue-rotate(40deg) brightness(1.3)}}
.particle{position:fixed;border-radius:50%;z-index:-1;bottom:-20px;background:rgba(255,0,51,.3);animation:floatUp linear infinite}
@keyframes floatUp{0%{transform:translateY(0) scale(1);opacity:0}10%{opacity:.7}90%{opacity:.3}100%{transform:translateY(-110vh) scale(.3);opacity:0}}

.navbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;
  padding:14px 22px;background:rgba(10,10,20,.75);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);animation:fadeDown .7s ease both}
@keyframes fadeDown{from{opacity:0;transform:translateY(-25px)}to{opacity:1;transform:translateY(0)}}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;font-size:1.25rem;font-weight:800;color:var(--text)}
.logo-icon{width:38px;height:38px;border-radius:11px;flex-shrink:0;background:linear-gradient(135deg,var(--red),var(--purple));
  display:flex;align-items:center;justify-content:center;box-shadow:0 0 18px rgba(255,0,51,.5);animation:logoPulse 2.5s ease-in-out infinite}
@keyframes logoPulse{0%,100%{box-shadow:0 0 12px rgba(255,0,51,.45);transform:rotate(0)}50%{box-shadow:0 0 26px rgba(255,0,51,.8);transform:rotate(-4deg)}}
.logo-text{background:linear-gradient(90deg,#fff,var(--red2),#fff);background-size:200% auto;
  -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;animation:shine 4s linear infinite}
@keyframes shine{to{background-position:200% center}}
.nav-links{display:flex;align-items:center;gap:10px}
.nav-btn{text-decoration:none;color:var(--muted);font-weight:600;font-size:.9rem;padding:9px 18px;border-radius:50px;
  transition:all .3s;border:1px solid transparent;background:none;cursor:pointer}
.nav-btn:hover{color:#fff;background:rgba(255,255,255,.07);border-color:var(--border)}
.nav-btn.admin{color:#fff;border:1px solid rgba(255,0,51,.5);background:rgba(255,0,51,.1)}
.nav-btn.admin:hover{background:var(--red);box-shadow:0 0 20px rgba(255,0,51,.5)}

.auth-wrap{max-width:430px;margin:60px auto;padding:0 18px;animation:cardUp .8s ease both}
@keyframes cardUp{from{opacity:0;transform:translateY(40px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:24px;
  padding:38px 32px;box-shadow:0 30px 70px rgba(0,0,0,.55);position:relative;overflow:hidden}
.auth-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg,var(--red),var(--purple),var(--red));background-size:200% auto;animation:shine 3s linear infinite}
.auth-card h2{text-align:center;font-size:1.5rem;margin-bottom:6px}
.auth-card .sub{text-align:center;color:var(--muted);font-size:.88rem;margin-bottom:26px}
.lock-icon{width:64px;height:64px;margin:0 auto 18px;border-radius:50%;
  background:linear-gradient(135deg,var(--red),var(--purple));
  display:flex;align-items:center;justify-content:center;font-size:1.7rem;
  box-shadow:0 0 30px rgba(255,0,51,.5);animation:logoPulse 2.5s ease-in-out infinite}

.field{margin-bottom:18px}
.field label{display:block;font-size:.82rem;font-weight:700;color:var(--muted);margin-bottom:8px;letter-spacing:.5px}
.field input,.field textarea{width:100%;padding:14px 16px;border-radius:13px;
  background:var(--card2);border:1px solid var(--border);color:var(--text);
  font-size:.95rem;outline:none;transition:border-color .3s, box-shadow .3s}
.field input:focus,.field textarea:focus{border-color:var(--red);box-shadow:0 0 0 4px rgba(255,0,51,.14)}
.field textarea{min-height:230px;resize:vertical;
  font-family:'Cascadia Code','Fira Code',Consolas,monospace;font-size:.85rem;line-height:1.6}

.msg{padding:13px 16px;border-radius:12px;font-size:.88rem;margin-bottom:16px;display:none;animation:shake .45s ease}
.msg.show{display:block}
.msg.error{background:rgba(255,0,51,.12);border:1px solid rgba(255,0,51,.4);color:#ff8095}
.msg.success{background:rgba(0,200,120,.12);border:1px solid rgba(0,200,120,.4);color:#4ade80}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;
  padding:14px 32px;border-radius:50px;border:none;cursor:pointer;
  font-size:1rem;font-weight:800;color:#fff;text-decoration:none;position:relative;overflow:hidden;
  background:linear-gradient(270deg,#ff0033,#ff4d6d,#c1121f,#ff0033);background-size:400% 400%;
  animation:gradMove 4s ease infinite;box-shadow:0 8px 28px rgba(255,0,51,.4);
  transition:transform .25s, box-shadow .25s}
.btn:hover{transform:scale(1.05) translateY(-2px);box-shadow:0 14px 40px rgba(255,0,51,.6)}
.btn:active{transform:scale(.96)}
@keyframes gradMove{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
.btn::after{content:'';position:absolute;top:0;left:-80%;width:50%;height:100%;
  background:linear-gradient(120deg,transparent,rgba(255,255,255,.4),transparent);
  transform:skewX(-25deg);animation:shimmer 2.8s infinite}
@keyframes shimmer{0%{left:-80%}60%,100%{left:140%}}
.btn.ghost{background:transparent;border:1px solid var(--border);box-shadow:none;animation:none;color:var(--muted);font-weight:600}
.btn.ghost::after{display:none}
.btn.ghost:hover{color:#fff;border-color:rgba(255,0,51,.5);background:rgba(255,0,51,.08)}
.btn.small{padding:9px 20px;font-size:.85rem}

.admin-wrap{max-width:980px;margin:0 auto;padding:24px 18px}
.admin-head{display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;
  margin-bottom:24px;animation:fadeDown .7s ease both}
.admin-panel{background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:28px;margin-bottom:26px;animation:cardUp .8s ease both}
.admin-panel h3{margin-bottom:18px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.tabs{display:flex;gap:8px;margin-bottom:16px}
.tab{padding:9px 20px;border-radius:50px;cursor:pointer;font-size:.85rem;font-weight:700;
  background:var(--card2);border:1px solid var(--border);color:var(--muted);transition:all .3s}
.tab.active{background:var(--red);color:#fff;border-color:var(--red);box-shadow:0 0 16px rgba(255,0,51,.4)}
.preview-frame{width:100%;height:420px;border:1px solid var(--border);border-radius:14px;background:#fff}

.admin-post-item{display:flex;align-items:center;justify-content:space-between;gap:14px;
  padding:16px 18px;border:1px solid var(--border);border-radius:14px;
  margin-bottom:12px;background:var(--card2);transition:border-color .3s, transform .3s;animation:cardUp .6s ease both}
.admin-post-item:hover{border-color:rgba(255,0,51,.4);transform:translateX(5px)}
.admin-post-item .info{min-width:0;flex:1}
.admin-post-item .info b{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.admin-post-item .info small{color:var(--muted)}
.post-url{display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap}
.post-url code{background:var(--dark);border:1px solid var(--border);padding:5px 10px;border-radius:8px;
  font-size:.72rem;color:#7dd3fc;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.copy-btn{padding:5px 12px;border-radius:8px;border:1px solid rgba(255,0,51,.4);background:rgba(255,0,51,.1);
  color:var(--red2);font-size:.72rem;font-weight:700;cursor:pointer;transition:all .25s}
.copy-btn:hover{background:var(--red);color:#fff}
.admin-post-item .actions{display:flex;gap:8px;flex-shrink:0}
.icon-btn{width:40px;height:40px;border-radius:11px;border:1px solid var(--border);cursor:pointer;
  background:var(--card);color:var(--text);font-size:1rem;
  display:flex;align-items:center;justify-content:center;transition:all .25s}
.icon-btn:hover{transform:scale(1.12)}
.icon-btn.edit:hover{background:#2563eb;border-color:#2563eb}
.icon-btn.del:hover{background:var(--red);border-color:var(--red)}

.loader{display:flex;justify-content:center;padding:60px 0}
.spinner{width:48px;height:48px;border-radius:50%;border:4px solid rgba(255,0,51,.15);border-top-color:var(--red);animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

footer{text-align:center;padding:34px 16px;color:#50506a;font-size:.8rem;border-top:1px solid var(--border);margin-top:40px}
footer .f-logo{font-weight:800;color:var(--muted);margin-bottom:6px}

@media(max-width:560px){
  .navbar{padding:12px 14px}.logo{font-size:1.05rem}
  .admin-panel{padding:20px 16px}
  .auth-card{padding:30px 22px}
  .admin-post-item{flex-direction:column;align-items:flex-start}
  .admin-post-item .actions{align-self:flex-end}
}
</style>
</head>
<body>

<div class="bg-glow"></div>

<nav class="navbar">
  <a class="logo" href="index.html">
    <span class="logo-icon">🦁</span>
    <span class="logo-text">Liger&nbsp;Co</span>
  </a>
  <div class="nav-links">
    <a class="nav-btn" href="index.html">🏠 Home</a>
    <button class="nav-btn admin" id="logoutBtn" style="display:none">🚪 Logout</button>
  </div>
</nav>

<!-- ===== LOGIN ===== -->
<section id="loginSection" class="auth-wrap" style="display:none">
  <div class="auth-card">
    <div class="lock-icon">🔐</div>
    <h2>Admin Login</h2>
    <p class="sub">Authorized access only — admin can add &amp; edit posts</p>
    <div id="loginMsg" class="msg error"></div>
    <form id="loginForm">
      <div class="field">
        <label>📧 ADMIN EMAIL</label>
        <input type="email" id="loginEmail" placeholder="admin@email.com" required autocomplete="username">
      </div>
      <div class="field">
        <label>🔑 PASSCODE</label>
        <input type="password" id="loginPass" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn" style="width:100%" id="loginBtn">🚀 Login to Dashboard</button>
    </form>
  </div>
</section>

<!-- ===== DASHBOARD ===== -->
<section id="dashSection" class="admin-wrap" style="display:none">

  <div class="admin-head">
    <div>
      <h2>👑 Admin Dashboard — Liger Co</h2>
      <p style="color:var(--muted);font-size:.85rem;margin-top:4px" id="adminEmailLabel"></p>
    </div>
    <a class="btn ghost small" href="index.html" target="_blank">👁 View Site</a>
  </div>

  <div class="admin-panel">
    <h3 id="editorTitle">✍️ Add New Post</h3>
    <div id="postMsg" class="msg"></div>

    <div class="field">
      <label>📌 POST TITLE</label>
      <input type="text" id="postTitle" placeholder="e.g. Watch Full Video — Episode 05">
    </div>

    <div class="field">
      <label>💻 POST HTML CODE (type / paste your full HTML here)</label>
      <div class="tabs">
        <div class="tab active" id="tabCode">⌨️ Code</div>
        <div class="tab" id="tabPreview">👁 Live Preview</div>
      </div>
      <textarea id="postHtml" spellcheck="false" placeholder="&lt;h1&gt;Hello&lt;/h1&gt;
&lt;p&gt;Type your full HTML code here — styles, scripts, buttons, anything!&lt;/p&gt;"></textarea>
      <iframe id="previewFrame" class="preview-frame" style="display:none" frameborder="0"></iframe>
    </div>

    <div style="display:flex;gap:12px;flex-wrap:wrap">
      <button class="btn" id="saveBtn">💾 Publish Post</button>
      <button class="btn ghost" id="cancelEditBtn" style="display:none">✖ Cancel Edit</button>
    </div>
  </div>

  <div class="admin-panel">
    <h3>📚 Manage Posts <span id="postCount" style="color:var(--muted);font-size:.85rem;font-weight:400"></span></h3>
    <div id="adminLoader" class="loader"><div class="spinner"></div></div>
    <div id="adminPostList"></div>
    <div id="adminEmpty" style="display:none;color:var(--muted);text-align:center;padding:20px">No posts yet — create your first post above! 🚀</div>
  </div>

</section>

<footer>
  <div class="f-logo">🦁 Liger Co</div>
  Admin Panel — © 2026 Liger Co
</footer>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, collection, query, orderBy, getDocs, addDoc, doc, updateDoc, deleteDoc, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBRdukrD1dM5AJmbAh7JPT2yWsHdgzbvzw",
    authDomain: "ssss-19e02.firebaseapp.com",
    projectId: "ssss-19e02",
    storageBucket: "ssss-19e02.firebasestorage.app",
    messagingSenderId: "17505490718",
    appId: "1:17505490718:web:505a11b64236129907db0f",
    measurementId: "G-P4EY62HW01"
  };
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  /* 👑 ADMIN EMAIL — මේ email එකට විතරයි access */
  const ADMIN_EMAIL = "sadithas59@gmail.com";

  for(let i=0;i<14;i++){
    const p=document.createElement('div');p.className='particle';
    const s=Math.random()*5+2;p.style.width=p.style.height=s+'px';
    p.style.left=Math.random()*100+'vw';
    p.style.animationDuration=(Math.random()*12+8)+'s';
    p.style.animationDelay=(Math.random()*10)+'s';
    document.body.appendChild(p);
  }

  const $=id=>document.getElementById(id);
  const loginSection=$('loginSection'), dashSection=$('dashSection'), logoutBtn=$('logoutBtn');
  let editingId=null;

  onAuthStateChanged(auth, user=>{
    if(user && user.email?.toLowerCase()===ADMIN_EMAIL.toLowerCase()){
      loginSection.style.display='none';
      dashSection.style.display='block';
      logoutBtn.style.display='inline-flex';
      $('adminEmailLabel').textContent='✅ Logged in as '+user.email;
      loadPosts();
    }else{
      if(user) signOut(auth);
      loginSection.style.display='block';
      dashSection.style.display='none';
      logoutBtn.style.display='none';
    }
  });

  $('loginForm').addEventListener('submit', async e=>{
    e.preventDefault();
    const msg=$('loginMsg');
    msg.classList.remove('show');
    const email=$('loginEmail').value.trim();
    const pass=$('loginPass').value;
    if(email.toLowerCase()!==ADMIN_EMAIL.toLowerCase()){
      msg.textContent='⛔ This email is not the admin account!';
      msg.classList.add('show');return;
    }
    $('loginBtn').textContent='⏳ Checking…';
    try{
      await signInWithEmailAndPassword(auth,email,pass);
    }catch(err){
      msg.textContent='⛔ Wrong passcode or login failed. ('+err.code+')';
      msg.classList.add('show');
    }
    $('loginBtn').textContent='🚀 Login to Dashboard';
  });

  logoutBtn.addEventListener('click',()=>signOut(auth));

  $('tabCode').onclick=()=>{
    $('tabCode').classList.add('active');$('tabPreview').classList.remove('active');
    $('postHtml').style.display='block';$('previewFrame').style.display='none';
  };
  $('tabPreview').onclick=()=>{
    $('tabPreview').classList.add('active');$('tabCode').classList.remove('active');
    $('postHtml').style.display='none';
    const f=$('previewFrame');f.style.display='block';
    f.srcdoc=$('postHtml').value||'<p style="font-family:sans-serif;color:#888;padding:20px">Nothing to preview yet…</p>';
  };

  function showMsg(text,ok){
    const m=$('postMsg');m.textContent=text;
    m.className='msg show '+(ok?'success':'error');
    setTimeout(()=>m.classList.remove('show'),6000);
  }

  /* Post URL builder — unique URL per post */
  function postUrl(id){
    return new URL('post.html?id='+id, location.href).href;
  }

  $('saveBtn').addEventListener('click', async ()=>{
    const title=$('postTitle').value.trim();
    const html=$('postHtml').value.trim();
    if(!title){showMsg('⚠️ Please enter a post title!',false);return}
    if(!html){showMsg('⚠️ Please type the HTML code for the post!',false);return}
    $('saveBtn').textContent='⏳ Saving…';
    try{
      if(editingId){
        await updateDoc(doc(db,'posts',editingId),{title,html,updatedAt:serverTimestamp()});
        showMsg('✅ Post updated! URL: '+postUrl(editingId),true);
      }else{
        const ref=await addDoc(collection(db,'posts'),{title,html,createdAt:serverTimestamp()});
        showMsg('🎉 Post published! Unique URL: '+postUrl(ref.id),true);
      }
      resetEditor();loadPosts();
    }catch(err){
      showMsg('⛔ Save failed: '+err.message,false);
    }
    $('saveBtn').textContent='💾 Publish Post';
  });

  function resetEditor(){
    editingId=null;
    $('postTitle').value='';$('postHtml').value='';
    $('editorTitle').textContent='✍️ Add New Post';
    $('saveBtn').textContent='💾 Publish Post';
    $('cancelEditBtn').style.display='none';
    $('tabCode').click();
  }
  $('cancelEditBtn').addEventListener('click',resetEditor);

  async function loadPosts(){
    const list=$('adminPostList'), loaderEl=$('adminLoader'), emptyEl=$('adminEmpty');
    list.innerHTML='';emptyEl.style.display='none';loaderEl.style.display='flex';
    try{
      const snap=await getDocs(query(collection(db,'posts'),orderBy('createdAt','desc')));
      loaderEl.style.display='none';
      $('postCount').textContent='('+snap.size+' posts)';
      if(snap.empty){emptyEl.style.display='block';return}

      snap.forEach(d=>{
        const post=d.data();
        const url=postUrl(d.id);
        const date=post.createdAt?.toDate
          ? post.createdAt.toDate().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}):'';
        const item=document.createElement('div');
        item.className='admin-post-item';

        const info=document.createElement('div');
        info.className='info';
        const b=document.createElement('b');b.textContent=post.title||'Untitled';
        const sm=document.createElement('small');sm.textContent='📅 '+date;
        const urlRow=document.createElement('div');
        urlRow.className='post-url';
        const code=document.createElement('code');code.textContent=url;
        const copyB=document.createElement('button');
        copyB.className='copy-btn';copyB.textContent='📋 Copy URL';
        copyB.onclick=()=>{
          navigator.clipboard.writeText(url).then(()=>{
            copyB.textContent='✅ Copied!';
            setTimeout(()=>copyB.textContent='📋 Copy URL',2000);
          });
        };
        urlRow.append(code,copyB);
        info.append(b,sm,urlRow);

        const actions=document.createElement('div');
        actions.className='actions';

        const viewB=document.createElement('button');
        viewB.className='icon-btn';viewB.title='View';viewB.textContent='👁';
        viewB.onclick=()=>window.open(url,'_blank');

        const editB=document.createElement('button');
        editB.className='icon-btn edit';editB.title='Edit';editB.textContent='✏️';
        editB.onclick=()=>{
          editingId=d.id;
          $('postTitle').value=post.title||'';
          $('postHtml').value=post.html||'';
          $('editorTitle').textContent='✏️ Edit Post';
          $('saveBtn').textContent='💾 Update Post';
          $('cancelEditBtn').style.display='inline-flex';
          window.scrollTo({top:0,behavior:'smooth'});
        };

        const delB=document.createElement('button');
        delB.className='icon-btn del';delB.title='Delete';delB.textContent='🗑';
        delB.onclick=async ()=>{
          if(!confirm('Delete "'+(post.title||'this post')+'" permanently?'))return;
          await deleteDoc(doc(db,'posts',d.id));
          loadPosts();
        };

        actions.append(viewB,editB,delB);
        item.append(info,actions);
        list.appendChild(item);
      });
    }catch(err){
      loaderEl.style.display='none';
      emptyEl.style.display='block';
      emptyEl.textContent='⛔ '+err.message;
    }
  }
</script>

</html>
